services:
  db:
    image: postgres:16-alpine
    container_name: warhammer-simulator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: warhammer
      POSTGRES_PASSWORD: warhammer
      POSTGRES_DB: warhammer_simulator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warhammer -d warhammer_simulator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
